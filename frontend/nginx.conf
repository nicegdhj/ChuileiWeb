# ============================================================================
# 路由设计说明（维护时只需关注本段）
# ----------------------------------------------------------------------------
#  对外统一前缀：/chuilei/chatbox
#  规则约定：
#    - /chuilei/chatbox/api/...   → 后端所有 API（FastAPI router 都挂在 /api/v1 下）
#    - /chuilei/chatbox/files/... → 后端文件下载直链
#    - /chuilei/chatbox/...       → 其余一律视为前端 SPA 静态资源
#
#  新增后端接口零配置：只要继续挂在 /api/ 或 /files/ 下，nginx 自动转发，
#  不需要修改本文件。
#
#  如果以后修改前缀（chuilei/chatbox → 其他），统一改下面的 $app_prefix 即可。
# ============================================================================

map $http_host $dummy { default 1; }  # 占位以确保 map 模块可用

server {
    listen 80;
    server_name _;
    client_max_body_size 50m;

    root /usr/share/nginx/html;
    index index.html;
    absolute_redirect off;

    # Docker 内置 DNS（regex location + 变量 proxy_pass 需要 runtime 解析）
    resolver 127.0.0.11 valid=30s ipv6=off;

    # 根路径重定向到应用入口
    location = / {
        return 301 /chuilei/chatbox/;
    }

    # ---- 后端代理（一条 regex 通吃 /api/ 和 /files/）----
    location ~ ^/chuilei/chatbox/(api|files)/(.*)$ {
        proxy_pass http://api:8000/$1/$2$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SSE 流式输出 + 长连接
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        chunked_transfer_encoding on;
    }

    # ---- 前端 SPA 静态资源（兜底）----
    location /chuilei/chatbox {
        try_files $uri $uri/ /chuilei/chatbox/index.html;
    }
}
