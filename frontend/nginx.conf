server {
    listen 80;
    server_name _;
    client_max_body_size 50m;

    root /usr/share/nginx/html;
    index index.html;

    # 根路径重定向到应用入口
    location = / {
        return 301 /chuilei/chat/;
    }

    # SPA 静态文件（dist 复制到 /chuilei/chat/ 子目录）
    location /chuilei/chat/ {
        try_files $uri $uri/ /chuilei/chat/index.html;
    }

    # 后端 API 代理：/chuilei/api/ → http://api:8000/api/
    location /chuilei/api/ {
        proxy_pass http://api:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SSE 支持
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        chunked_transfer_encoding on;
    }

    # 上传文件直链代理
    location /chuilei/files/ {
        proxy_pass http://api:8000/files/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 120s;
    }
}
