# 离线部署用 —— 使用预构建镜像，不需要源码
services:
  api:
    image: chatbox-private-api:latest
    environment:
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_MODEL=${LLM_MODEL}
      - LLM_MAX_TOKENS=${LLM_MAX_TOKENS:-32000}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_TIMEOUT_SECONDS=${LLM_TIMEOUT_SECONDS:-300}
      - LOG_LEVEL=${BACKEND_LOG_LEVEL:-INFO}
    volumes:
      - ./data/db:/data/db
      - ./data/uploads:/data/uploads
    restart: unless-stopped
    networks: [internal]

  web:
    image: chatbox-private-web:latest
    ports:
      - "${WEB_PORT:-8088}:80"
    depends_on:
      - api
    restart: unless-stopped
    networks: [internal]

networks:
  internal:
    driver: bridge
