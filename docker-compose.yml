services:
  api:
    build:
      context: ./backend
    environment:
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_MODEL=${LLM_MODEL}
      - LLM_MAX_TOKENS=${LLM_MAX_TOKENS}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_TIMEOUT_SECONDS=${LLM_TIMEOUT_SECONDS}
      - LOG_LEVEL=${BACKEND_LOG_LEVEL}
    volumes:
      - ./data/db:/data/db
      - ./data/uploads:/data/uploads
    restart: unless-stopped
    networks: [internal]

  web:
    build:
      context: ./frontend
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      - api
    restart: unless-stopped
    networks: [internal]

networks:
  internal:
    driver: bridge
